<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>OfferScope 录取雷达 · 找中介之前，先看清你的真实申请位置</title>
<style>
:root{
  --navy:#1E3A8A; --blue:#2563EB; --bluebg:#EFF6FF;
  --amber:#F59E0B;
  --risk-high:#DC2626; --risk-mid:#F97316; --risk-low:#16A34A;
  --text:#111827; --text2:#6B7280; --border:#E5E7EB; --bg:#F9FAFB;
  --radius:14px; --shadow:0 1px 3px rgba(17,24,39,.08),0 8px 24px rgba(17,24,39,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  color:var(--text);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;font-size:17px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none}
.container{max-width:1080px;margin:0 auto;padding:0 20px}
.container.tight{max-width:920px}
.hidden{display:none!important}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;
  border-radius:11px;padding:14px 28px;font-size:16px;transition:.15s;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--navy)}
.btn-amber{background:var(--amber);color:#fff;box-shadow:0 8px 22px rgba(245,158,11,.32)}
.btn-amber:hover{filter:brightness(.97)}
.btn-ghost{background:#fff;color:var(--navy);border:2px solid var(--border)}
.btn-ghost:hover{border-color:var(--blue)}
.btn-lg{padding:18px 38px;font-size:19px;border-radius:13px}
.btn-block{width:100%}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* Header */
header.site{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
header.site .container{display:flex;align-items:center;justify-content:space-between;height:62px}
.logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px;color:var(--navy)}
.logo .dot{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--navy),var(--blue));
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
.logo small{font-weight:600;color:var(--text2);font-size:12px}
.nav-links{display:flex;gap:22px;align-items:center;font-size:14px;color:var(--text2)}
.nav-links a:hover{color:var(--blue)}
@media(max-width:720px){.nav-links{display:none}}

/* Footer */
footer.site{background:#0f1a3a;color:#cbd5e1;margin-top:60px;padding:38px 0 28px}
footer.site .cols{display:flex;flex-wrap:wrap;gap:40px;justify-content:space-between}
footer.site h4{color:#fff;font-size:14px;margin-bottom:12px}
footer.site a{display:block;font-size:14px;color:#94a3b8;margin-bottom:7px}
footer.site a:hover{color:#fff}
.disclaimer-bar{border-top:1px solid #1e2b52;margin-top:26px;padding-top:18px;font-size:13px;color:#8493b3;line-height:1.7}

/* Sections */
section.block{padding:46px 0}
.eyebrow{color:var(--blue);font-weight:800;font-size:14px;letter-spacing:.06em;margin-bottom:14px}
h1.hero-title{text-wrap:balance;font-size:54px;line-height:1.12;font-weight:900;letter-spacing:-.02em;color:var(--text)}
.sec-title{font-size:36px;font-weight:900;letter-spacing:-.01em;text-align:center;line-height:1.2}
.sec-sub{text-align:center;color:var(--text2);max-width:640px;margin:14px auto 0;font-size:18px}
@media(max-width:720px){h1.hero-title{text-wrap:balance;font-size:36px}.sec-title{font-size:27px}}

/* Hero */
.hero{background:linear-gradient(180deg,var(--bluebg),#fff);padding:58px 0 50px;text-align:center}
.hero p.sub{font-size:21px;color:#374151;max-width:680px;margin:22px auto 16px;line-height:1.55}
.hero .cta-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:26px}
.hero .anchor{display:inline-block;background:#f0fdf4;border:1.5px solid #bbf7d0;color:#15803d;
  font-weight:700;font-size:16px;padding:10px 18px;border-radius:999px;margin-top:6px}
.hero .assist{margin-top:18px;font-size:14px;color:var(--text2)}
.badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:26px}
.badge{background:#fff;border:1px solid var(--border);border-radius:999px;padding:8px 16px;font-size:14px;
  color:var(--navy);font-weight:700;box-shadow:var(--shadow)}

/* Pain points */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:30px}
.pain-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px 18px;
  font-size:18px;font-weight:700;color:var(--text);display:flex;gap:12px;align-items:flex-start;line-height:1.45}
.pain-card .q{color:var(--amber);font-size:24px;line-height:1.1;font-weight:900}

/* Steps */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:30px}
@media(max-width:560px){.steps{grid-template-columns:repeat(2,1fr)}}
.step{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px;text-align:center}
.step .n{width:40px;height:40px;border-radius:50%;background:var(--bluebg);color:var(--blue);font-weight:900;font-size:18px;
  display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.step p{font-size:14px;color:var(--text2)}
.step b{display:block;color:var(--text);margin-bottom:4px;font-size:16px}

/* Report preview */
.preview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:13px;margin-top:30px}
.pv{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px;display:flex;gap:12px;align-items:flex-start}
.pv .ic{width:38px;height:38px;border-radius:10px;background:var(--bluebg);color:var(--blue);display:flex;
  align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.pv b{font-size:16px}.pv p{font-size:14px;color:var(--text2);margin-top:2px}

/* Emotion / value strip */
.value-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:13px;margin-top:30px}
.vchip{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px;text-align:center}
.vchip .ic{font-size:26px}
.vchip b{display:block;font-size:17px;margin:8px 0 3px}
.vchip p{font-size:13px;color:var(--text2)}
.good-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.good-item{display:flex;gap:9px;align-items:flex-start;background:var(--bluebg);border-radius:10px;padding:11px 13px;font-size:14.5px;color:#1f2937}
.good-item .tick{color:var(--blue);font-weight:800;flex:0 0 auto}
@media(max-width:560px){.good-grid{grid-template-columns:1fr}}
.quote-band{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border-radius:18px;
  padding:40px 32px;text-align:center;margin-top:6px}
.quote-band .big{font-size:30px;font-weight:900;line-height:1.3;letter-spacing:-.01em}
.quote-band .small{font-size:17px;opacity:.9;margin-top:12px}
@media(max-width:720px){.quote-band .big{font-size:23px}}

/* Pricing */
.pricing{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:20px;margin-top:38px;max-width:780px;margin-left:auto;margin-right:auto}
.price-card{background:#fff;border:1.5px solid var(--border);border-radius:18px;padding:30px 26px;position:relative}
.price-card.feat{border-color:var(--blue);box-shadow:0 12px 40px rgba(37,99,235,.16)}
.price-card .tag{position:absolute;top:-12px;right:22px;background:var(--amber);color:#fff;font-size:12px;
  font-weight:700;padding:4px 12px;border-radius:999px}
.price-card h3{font-size:20px}
.price-card .price{font-size:46px;font-weight:900;color:var(--navy);margin:10px 0 4px}
.price-card .price small{font-size:17px;color:var(--text2);font-weight:600}
.price-card .price .was{font-size:16px;color:var(--text2);font-weight:500;text-decoration:line-through;margin-left:8px}
.price-card .desc{color:#374151;font-size:15px;min-height:46px}
.price-card ul{list-style:none;margin:18px 0 22px}
.price-card li{font-size:15px;padding:8px 0 8px 26px;position:relative;border-bottom:1px dashed var(--border)}
.price-card li:before{content:"✓";position:absolute;left:0;color:var(--risk-low);font-weight:800}

/* Generic page card */
.page{padding:40px 0 30px;min-height:60vh}
.panel{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow)}
.panel+.panel{margin-top:18px}

/* Stepper */
.stepper{display:flex;gap:6px;margin-bottom:26px;flex-wrap:wrap}
.stepper .s{flex:1;min-width:70px;text-align:center;font-size:12px;color:var(--text2);padding-bottom:8px;border-bottom:3px solid var(--border)}
.stepper .s.active{color:var(--blue);border-color:var(--blue);font-weight:700}
.stepper .s.done{color:var(--risk-low);border-color:var(--risk-low)}

/* Forms */
.field{margin-bottom:18px}
.field label{display:block;font-size:14px;font-weight:600;margin-bottom:7px}
.field .hint{font-size:12px;color:var(--text2);font-weight:400;margin-bottom:7px;margin-top:-3px}
.field input,.field select,.field textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;
  padding:11px 13px;font-size:14px;font-family:inherit;background:#fff;color:var(--text)}
.field textarea{min-height:84px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:620px){.grid2{grid-template-columns:1fr}}
.req:after{content:" *";color:var(--risk-high)}

/* Choice chips */
.choices{display:flex;flex-wrap:wrap;gap:10px}
.choice{border:1.5px solid var(--border);background:#fff;border-radius:10px;padding:11px 16px;font-size:14px;
  font-weight:600;color:var(--text);transition:.12s}
.choice:hover{border-color:var(--blue)}
.choice.sel{border-color:var(--blue);background:var(--bluebg);color:var(--navy)}
.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}
@media(max-width:560px){.level-grid{grid-template-columns:1fr}}
.level-card{border:2px solid var(--border);border-radius:16px;padding:26px 22px;text-align:center;cursor:pointer;transition:.15s;background:#fff}
.level-card:hover{border-color:var(--blue)}
.level-card.sel{border-color:var(--blue);background:var(--bluebg)}
.level-card .ic{font-size:34px}
.level-card b{display:block;font-size:19px;margin:10px 0 6px}
.level-card p{font-size:13px;color:var(--text2)}

/* school rows */
.school-row{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;background:var(--bg)}
.school-row .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.school-row .rm{color:var(--risk-high);font-size:13px;font-weight:600;background:none;cursor:pointer}
.ac-wrap{position:relative}
.ac-list{position:absolute;left:0;right:0;top:calc(100% + 4px);background:#fff;border:1px solid var(--border);
  border-radius:10px;box-shadow:var(--shadow);z-index:30;max-height:248px;overflow:auto}
.ac-item{padding:11px 13px;font-size:14px;cursor:pointer;display:flex;justify-content:space-between;gap:10px;align-items:center}
.ac-item+.ac-item{border-top:1px solid var(--bg)}
.ac-item:hover{background:var(--bluebg)}
.ac-item b{font-weight:600;color:var(--text)}
.ac-item small{color:var(--text2);font-size:12px;white-space:nowrap}

.alert{background:#fef3c7;border:1px solid #fcd34d;color:#92400e;border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:16px}
.form-nav{display:flex;justify-content:space-between;gap:12px;margin-top:26px}

/* Free result */
.grade-hero{text-align:center;padding:14px 0 6px}
.grade-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 14px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;color:#fff;font-weight:850;background:linear-gradient(135deg,var(--navy),var(--blue))}
.grade-circle .g{font-size:48px;line-height:1}
.grade-circle .l{font-size:12px;font-weight:600;opacity:.85}
.riskbadge{display:inline-flex;align-items:center;gap:7px;padding:7px 16px;border-radius:999px;font-weight:700;font-size:14px}
.riskbadge:before{content:"";width:9px;height:9px;border-radius:50%;background:currentColor}
.rb-low{background:#dcfce7;color:#15803d}
.rb-neutral{background:#eff6ff;color:#2563EB}
.rb-mid{background:#fff7ed;color:#c2410c}
.rb-high{background:#fff7ed;color:#ea580c}
.free-hero{display:flex;gap:18px;align-items:center;justify-content:center;flex-wrap:wrap}
.cap-note{text-align:center;font-size:13px;color:var(--text2);margin-top:4px}
.risk-line{background:var(--bluebg);border:1px solid #dbeafe;border-radius:12px;padding:12px 15px;font-size:13px;
  color:#475569;margin-top:14px;display:flex;gap:9px;align-items:flex-start;line-height:1.6}

table.schools{width:100%;border-collapse:collapse;margin-top:6px}
table.schools th,table.schools td{text-align:left;padding:12px 10px;border-bottom:1px solid var(--border);font-size:14px}
table.schools th{color:var(--text2);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.verdict{display:inline-block;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap}

.risk-list{list-style:none;margin-top:8px}
.risk-list li{padding:12px 0 12px 30px;position:relative;border-bottom:1px solid var(--border);font-size:14px}
.risk-list li:before{content:"!";position:absolute;left:0;top:12px;width:20px;height:20px;border-radius:50%;
  background:#fee2e2;color:var(--risk-high);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center}

.lock-card{background:linear-gradient(180deg,var(--bluebg),#fff);border:1.5px solid var(--blue);
  border-radius:18px;padding:28px;margin-top:22px;text-align:center}
.lock-card .benefits{text-align:left;max-width:520px;margin:18px auto;list-style:none}
.lock-card .benefits li{padding:8px 0 8px 28px;position:relative;font-size:14px}
.lock-card .benefits li:before{content:"🔓";position:absolute;left:0}
.locked{position:relative;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin:18px 0;background:#fff;text-align:left}
.locked .blurred{filter:blur(5px);opacity:.7;pointer-events:none;user-select:none;padding:18px}
.locked .veil{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  background:linear-gradient(180deg,rgba(239,246,255,.2),rgba(255,255,255,.9))}
.locked .veil .lk{font-size:34px}
.locked .veil b{font-size:16px;color:var(--navy)}
.locked .veil span{font-size:13px;color:var(--text2)}
.module-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:8px;margin:16px 0;text-align:left}
.module-chip{background:#fff;border:1px solid var(--border);border-radius:9px;padding:9px 11px;font-size:13px;
  font-weight:600;display:flex;gap:7px;align-items:center;color:var(--text)}
.module-chip .lk{color:var(--text2);flex-shrink:0}
.mini-row{font-size:13px;font-weight:600;color:var(--text)}
.mini-bar{height:8px;background:var(--border);border-radius:99px;margin:5px 0 11px;overflow:hidden}
.mini-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--navy))}

/* Report */
.report-wrap{max-width:880px;margin:0 auto}
.report-cover{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border-radius:18px;padding:44px 36px;margin-bottom:22px}
.report-cover .k{font-size:13px;opacity:.8;letter-spacing:.1em;text-transform:uppercase}
.report-cover h1{font-size:32px;margin:10px 0 18px;font-weight:850}
.report-cover .meta{display:flex;flex-wrap:wrap;gap:10px 26px;font-size:14px;opacity:.92}
.rsec{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:26px;margin-bottom:18px}
.rsec h2{font-size:20px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.rsec h2 .num{width:28px;height:28px;border-radius:8px;background:var(--bluebg);color:var(--blue);font-size:14px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rsec .lead{color:var(--text2);font-size:14px;margin-bottom:16px}
.kpi-row{display:flex;flex-wrap:wrap;gap:14px;margin:8px 0 4px}
.kpi{flex:1;min-width:140px;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px}
.kpi .v{font-size:28px;font-weight:850;color:var(--navy)}.kpi .l{font-size:12px;color:var(--text2)}
/* 醒目的总体判断 KPI */
.exec-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:14px 0 6px}
@media(max-width:640px){.exec-kpis{grid-template-columns:1fr}}
.kpi2{border-radius:16px;padding:20px 22px;border:1px solid var(--border);background:#fff;box-shadow:0 1px 2px rgba(17,24,39,.04)}
.kpi2 .lab{font-size:13px;color:var(--text2);font-weight:600;margin-bottom:8px}
.kpi2 .big{font-size:44px;font-weight:900;line-height:1}
.kpi2 .big small{font-size:18px;color:var(--text2);font-weight:600}
.kpi2 .prog{height:9px;border-radius:99px;background:#eef1f5;margin-top:12px;overflow:hidden}
.kpi2 .prog i{display:block;height:100%;border-radius:99px}
.kpi2 .gradecircle{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:#fff}
.kpi2 .riskpill{display:inline-flex;align-items:center;gap:9px;font-weight:800;font-size:24px;padding:9px 20px;border-radius:12px}
.kpi2 .riskpill:before{content:'';width:11px;height:11px;border-radius:50%;background:currentColor}
.bar{height:9px;background:var(--border);border-radius:999px;overflow:hidden;margin-top:6px}
.bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--navy))}
.dim{margin-bottom:16px}
.dim .h{display:flex;justify-content:space-between;font-size:14px;font-weight:600}
.dim .a{font-size:13px;color:var(--text2);margin-top:6px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:620px){.two-col{grid-template-columns:1fr}}
.tile{border:1px solid var(--border);border-radius:12px;padding:16px}
.tile.good{background:#f0fdf4;border-color:#bbf7d0}
.tile.bad{background:#fff7ed;border-color:#fed7aa}
.tile h4{font-size:15px;margin-bottom:6px}
.tile p{font-size:13px;color:var(--text2)}
.pri{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;margin-left:6px}
.pri-高{background:#fee2e2;color:var(--risk-high)}.pri-中{background:#ffedd5;color:var(--risk-mid)}.pri-低{background:#dcfce7;color:var(--risk-low)}
.timeline{position:relative;padding-left:26px}
.timeline:before{content:"";position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:18px}
.tl-item:before{content:"";position:absolute;left:-23px;top:4px;width:14px;height:14px;border-radius:50%;background:var(--blue);border:3px solid #fff;box-shadow:0 0 0 1px var(--border)}
.tl-item .ph{font-weight:700;color:var(--navy);font-size:14px}
.tl-task{font-size:14px;margin:6px 0 2px;font-weight:600}
.tl-meta{font-size:12px;color:var(--text2)}
.parent-box{background:var(--bluebg);border:1px solid #bfdbfe;border-radius:12px;padding:20px}
.scan-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:620px){.scan-col{grid-template-columns:1fr}}
.scan-box{border-radius:12px;padding:16px;border:1px solid var(--border)}
.scan-box.hl{background:#f0fdf4;border-color:#bbf7d0}
.scan-box.rf{background:#fff7ed;border-color:#fed7aa}
.scan-box h4{font-size:14px;margin-bottom:8px}
.scan-box ul{list-style:none}
.scan-box li{font-size:13px;padding:6px 0 6px 24px;position:relative;color:#374151;line-height:1.5}
.scan-box.hl li:before{content:'🟢';position:absolute;left:0;font-size:11px;top:7px}
.scan-box.rf li:before{content:'🔴';position:absolute;left:0;font-size:11px;top:7px}
.angle{border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;background:var(--bg)}
.angle h4{font-size:15px;color:var(--navy);margin-bottom:7px}
.angle p{font-size:13px;color:#374151;margin:3px 0}

}

/* ---- AI backend bridge (graceful fallback to rule engine) ---- */
function showLoading(msg,sub){let el=document.getElementById('loadingBg');
  if(!el){el=document.createElement('div');el.id='loadingBg';el.className='loading-bg';document.body.appendChild(el);}
  el.innerHTML=`<div class="spinner"></div><div class="msg">${esc(msg||'录取雷达正在分析…')}</div><div class="sub">${esc(sub||'几秒钟，请稍候')}</div>`;
  el.style.display='flex';}
function hideLoading(){const el=document.getElementById('loadingBg');if(el)el.style.display='none';if(window._progT){clearInterval(window._progT);window._progT=null;}}
/* 分阶段进度条：title 标题，stages 阶段文案数组，estMs 预计耗时 */
function startProgress(title,stages,estMs){
  let el=document.getElementById('loadingBg');
  if(!el){el=document.createElement('div');el.id='loadingBg';el.className='loading-bg';document.body.appendChild(el);}
  el.innerHTML=`<div class="spinner"></div><div class="msg">${esc(title)}</div>
    <div class="pbar"><i id="pbarFill"></i></div>
    <div class="pct" id="pbarPct">0%</div>
    <div class="stage" id="pbarStage">${esc(stages[0]||'')}</div>`;
  el.style.display='flex';
  if(window._progT)clearInterval(window._progT);
  const t0=Date.now();
  window._progT=setInterval(()=>{
    const elapsed=Date.now()-t0;
    // 缓动逼近 92%，到点不到 100，留给真正完成时补满
    let p=Math.min(92,Math.round(92*(1-Math.exp(-elapsed/(estMs*0.55)))));
    const fill=document.getElementById('pbarFill'),pct=document.getElementById('pbarPct'),st=document.getElementById('pbarStage');
    if(fill)fill.style.width=p+'%'; if(pct)pct.textContent=p+'%';
    const si=Math.min(stages.length-1,Math.floor(p/ (92/stages.length)));
    if(st)st.textContent=stages[si]||'';
  },350);
}
function finishProgress(){
  const fill=document.getElementById('pbarFill'),pct=document.getElementById('pbarPct');
  if(window._progT){clearInterval(window._progT);window._progT=null;}
  if(fill)fill.style.width='100%'; if(pct)pct.textContent='100%';
  return new Promise(r=>setTimeout(()=>{hideLoading();r();},450));
}
async function aiPost(path,body){
  const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),150000);
  try{
    const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal:ctrl.signal});
    if(!r.ok)return null;
    const j=await r.json();
    if(j&&!j.ok&&j.error==='rate_limited')toast('操作太频繁，请稍等一会儿再试');
    return (j&&j.ok)?j.data:null;   // ok:false → null → 调用方回退规则引擎
  }catch(e){return null;}
  finally{clearTimeout(t);}
}

}

/* ===================== ASSESSMENT (spec §7-11) ===================== */
/* step: 0 level, 1 targets, 2 background, 3 prefs, 4 follow-up */
let STEP=0;
const STEP_LABELS=["申请阶段","目标院校","背景信息","申请偏好","关键追问"];

RENDER.assessment=function(){

const STEP_RENDER={};

/* ---- Step 0: application level ---- */

      <div class="level-card ${A.applicationLevel==='硕士'?'sel':''}" onclick="pickLevel('硕士')">

    </div>
    <div class="alert" style="margin-top:18px">当前 MVP 暂时只支持海外本科和硕士申请诊断。博士、MBA、转学、预科、语言班等其他申请类型将在后续版本中开放。</div>
    <div class="form-nav">
      <button class="btn btn-ghost" onclick="go('home')">取消</button>
      <button class="btn btn-primary" onclick="nextStep()" ${A.applicationLevel?'':'disabled'} id="nextBtn">下一步 →</button>
    </div>
  </div>`;
};
function pickLevel(l){A.applicationLevel=l;A.targetMajorCategory="";STEP_RENDER[0]();}

/* ---- Step 1: targets (region/school/major) ---- */
STEP_RENDER[1]=function(){
  if(!A.targetSchools.length)A.targetSchools=[{schoolName:"",programName:"",majorName:"",region:""}];
  const majors=A.applicationLevel==='本科'?UG_MAJORS:GRAD_MAJORS;
  $('#stepBody').innerHTML=`<div class="panel">
    <h2 style="font-size:22px">目标地区、学校与专业</h2>
    <p style="color:var(--text2);font-size:14px;margin-top:6px">${esc(A.applicationLevel)}申请 · 仅支持以下六个地区。</p>

    <div class="field" style="margin-top:18px"><label class="req">目标地区（可多选）</label>
      <div class="choices" id="regionChips">${SUPPORTED_REGIONS.map(r=>`<div class="choice ${A.targetRegions.includes(r)?'sel':''}" onclick="toggleRegion('${r}')">${r}</div>`).join('')}</div>
    </div>

    <div class="grid2">
      <div class="field"><label class="req">入学年份</label>
        <select onchange="A.intakeYear=this.value">${['',...INTAKE_YEARS].map(y=>`<option ${A.intakeYear===y?'selected':''}>${y||'请选择'}</option>`).join('')}</select></div>
      <div class="field"><label class="req">目标专业方向</label>
        <select onchange="A.targetMajorCategory=this.value">${['',...majors].map(m=>`<option ${A.targetMajorCategory===m?'selected':''}>${m||'请选择'}</option>`).join('')}</select></div>
    </div>

    <div class="field"><label class="req">目标学校</label>
      <div class="hint">先选地区，再输入学校名会自动联想（中英文都可搜）。<b>找不到联想？直接手动把完整校名打完即可，不影响测评。</b>可添加多所。</div>
      <div id="schoolList"></div>
      <button class="btn btn-ghost" style="padding:9px 16px;font-size:13px" onclick="addSchool()">+ 添加学校</button>
    </div>

    <div class="field"><label class="req">这份选校名单的来源</label>
      <div class="choices">${HAS_AGENCY.map(h=>`<div class="choice ${A.hasAgencyList===h?'sel':''}" onclick="A.hasAgencyList='${h}';STEP_RENDER[1]()">${h}</div>`).join('')}</div>
    </div>

    <div id="regionErr"></div>
    <div class="form-nav">
      <button class="btn btn-ghost" onclick="prevStep()">← 上一步</button>
      <button class="btn btn-primary" onclick="submitTargets()">下一步 →</button>
    </div>
  </div>`;
  renderSchoolRows();
};
function renderSchoolRows(){
  const wrap=$('#schoolList');if(!wrap)return;
  wrap.innerHTML=A.targetSchools.map((s,i)=>`<div class="school-row">
    <div class="top"><b style="font-size:13px;color:var(--text2)">学校 ${i+1}</b>
      ${A.targetSchools.length>1?`<button class="rm" onclick="rmSchool(${i})">删除</button>`:''}</div>
    <div class="grid2">
      <select onchange="A.targetSchools[${i}].region=this.value;var el=document.getElementById('schoolInp${i}');if(el)schoolSuggest(${i},el.value)">
        <option value="">① 先选所在地区</option>${SUPPORTED_REGIONS.map(r=>`<option ${s.region===r?'selected':''}>${r}</option>`).join('')}</select>
      <div class="ac-wrap">
        <input id="schoolInp${i}" autocomplete="off" placeholder="② 输入学校名，自动联想" value="${esc(s.schoolName)}"
          oninput="A.targetSchools[${i}].schoolName=this.value;schoolSuggest(${i},this.value)" onblur="acHide('acS${i}')">
        <div class="ac-list" id="acS${i}" style="display:none"></div>
      </div>
    </div>
    <div class="ac-wrap" style="margin-top:12px">
      <input id="majorInp${i}" autocomplete="off" placeholder="③ 项目 / 专业（选填），输入自动联想，如 Computer Science" value="${esc(s.majorName||s.programName||'')}"
        oninput="A.targetSchools[${i}].majorName=this.value;majorSuggest(${i},this.value)" onblur="acHide('acM${i}')">
      <div class="ac-list" id="acM${i}" style="display:none"></div>
    </div>
  </div>`).join('');
}
/* ---- 输入联想（autocomplete） ---- */
const _AC={};
function _renderAC(listId,inputId,items,onPick,hint){
  _AC[listId]={items,onPick,inputId};
  const el=document.getElementById(listId);if(!el)return;
  if(!items.length){
    if(hint){el.innerHTML=`<div class="ac-item" style="cursor:default;color:var(--text2)">${esc(hint)}</div>`;el.style.display='block';}
    else{el.style.display='none';el.innerHTML='';}
    return;
  }
  el.innerHTML=items.map((it,idx)=>`<div class="ac-item" onmousedown="acPick('${listId}',${idx})"><b>${esc(it.label)}</b>${it.sub?`<small>${esc(it.sub)}</small>`:''}</div>`).join('');
  el.style.display='block';
}
function acPick(listId,idx){const st=_AC[listId];if(!st)return;const it=st.items[idx];
  const inp=document.getElementById(st.inputId);if(inp)inp.value=it.value;st.onPick(it.value);
  const el=document.getElementById(listId);if(el){el.style.display='none';el.innerHTML='';}}
function acHide(listId){setTimeout(()=>{const el=document.getElementById(listId);if(el)el.style.display='none';},160);}
function schoolSuggest(i,val){
  const region=A.targetSchools[i].region;const q=(val||'').trim().toLowerCase();
  const pool=SCHOOLS.filter(s=>!region||s.region===region);
  const res=!q?[]:pool.filter(s=>s.name.toLowerCase().includes(q)||(s.cn&&s.cn.includes(val.trim()))).slice(0,8);
  const hint=(q.length>=1&&!res.length)?'✅ 没找到也没关系——把完整校名打完即可，不影响测评':'';
  _renderAC('acS'+i,'schoolInp'+i,res.map(s=>({label:s.name,sub:s.cn+' · '+s.region,value:s.name})),
    v=>{A.targetSchools[i].schoolName=v;const f=SCHOOLS.find(x=>x.name===v);if(f&&!A.targetSchools[i].region)A.targetSchools[i].region=f.region;renderSchoolRows();},hint);
}
function majorSuggest(i,val){
  const q=(val||'').trim().toLowerCase();
  const res=!q?[]:MAJOR_SUGGEST.filter(m=>m.name.toLowerCase().includes(q)||m.cn.includes(val.trim())).slice(0,8);
  const hint=(q.length>=2&&!res.length)?'未在常见库中找到 — 直接输入完整专业名即可 ✓（如 USC Strategic PR）':'';
  _renderAC('acM'+i,'majorInp'+i,res.map(m=>({label:m.name,sub:m.cn,value:m.name})),v=>{A.targetSchools[i].majorName=v;},hint);
}
/* 本科院校联想 + 自动识别院校层级（硕士表单） */
function ugSchoolSuggest(val){
  const q=(val||'').trim();
  const exact=CN_UNIVERSITIES.find(u=>u.name===q);
  if(exact)A.fields.undergraduateSchoolTier=exact.tier;   // 边输入边自动识别
  const res=!q?[]:CN_UNIVERSITIES.filter(u=>u.name.includes(q)).slice(0,8);
  const hint=(q.length>=2&&!res.length)?'未在名单中 — 直接输入，并在下方手选院校层级':'';
  _renderAC('acUg','ugSchoolInp',res.map(u=>({label:u.name,sub:u.tier,value:u.name})),
    v=>{A.fields.undergraduateSchool=v;const f=CN_UNIVERSITIES.find(x=>x.name===v);if(f)A.fields.undergraduateSchoolTier=f.tier;STEP_RENDER[2]();},hint);
}
function toggleRegion(r){const i=A.targetRegions.indexOf(r);i>=0?A.targetRegions.splice(i,1):A.targetRegions.push(r);STEP_RENDER[1]();}
function addSchool(){A.targetSchools.push({schoolName:"",majorName:"",region:""});renderSchoolRows();}
function rmSchool(i){A.targetSchools.splice(i,1);renderSchoolRows();}
function submitTargets(){
  const err=$('#regionErr');err.innerHTML="";
  if(!A.targetRegions.length){err.innerHTML=`<div class="alert">请至少选择一个目标地区。${UNSUPPORTED_HINT}</div>`;return;}
  if(!A.intakeYear||!A.targetMajorCategory){toast('请选择入学年份和目标专业方向');return;}
  const valid=A.targetSchools.filter(s=>s.schoolName.trim());
  if(!valid.length){toast('请至少填写一所目标学校');return;}
  for(const s of valid){if(s.region&&!SUPPORTED_REGIONS.includes(s.region)){err.innerHTML=`<div class="alert">${UNSUPPORTED_HINT}</div>`;return;}}

/* ===================== AI FOLLOW-UP (spec §12) ===================== */
async function genFollowUp(){

function buildFollowUp(){
  const lvl=A.applicationLevel, major=A.targetMajorCategory||"", region=A.targetRegions[0]||"", f=A.fields;
  const qs=[];

        qs.push({q:`你的活动 / 经历里，哪一条最能代表你申请${major}的动机和能力？`,r:`招生官希望看到与申请方向一致的代表性经历。`,key:'signatureActivity'});
      if(!/持续|年|长期/.test(f.activities||''))
        qs.push({q:'你的活动列表里是否有一条持续 2 年以上的主线？如果有，是什么？',r:'美国本科很看重活动连续性和个人主线，而不只是活动数量。',key:'activitySpine'});
      if((f.earlyDecisionPlan||'')==='准备 ED / EA'||!f.earlyDecisionPlan)
        qs.push({q:'你是否计划申请 ED / EA？如果有，第一志愿是哪一所？',r:'早申策略会明显影响美国本科申请的风险和机会判断。',key:'edPlan'});
    }else if(region==='英国'){
      // 英国：高度学术导向，看预估成绩与 PS，几乎不看活动
      qs.push({q:`你的 A-Level / IB 预估成绩（或高考 / 在读成绩）目前如何？是否达到 ${major} 目标专业的要求？`,r:'英国本科以学术成绩与预估成绩为核心录取依据。',key:'ukPredicted'});
      qs.push({q:`你打算在个人陈述（PS）里突出哪条与 ${major} 相关的学术兴趣或经历？`,r:'英国 PS 高度学术导向，是录取的关键材料。',key:'ukPS'});
      qs.push({q:`你是否有与 ${major} 直接相关的课程、阅读或项目，能体现专业投入？`,r:'英国看重专业对口度，而非课外活动的广度。',key:'ukSubjectFit'});
    }else if(region==='澳洲'||region==='加拿大'){
      // 澳加：门槛逻辑，GPA + 语言达标为主
      qs.push({q:'你的 GPA / 在读成绩目前大概是多少？是否达到目标学校的分数线？',r:`${region}本科以 GPA 与语言达标为主要门槛。`,key:'gpaThreshold'});
      qs.push({q:'你的语言成绩（雅思 / 托福）是否已达到目标项目的要求？',r:'语言达标是录取的硬门槛。',key:'langThreshold'});
      qs.push({q:`你是否有与 ${major} 相关的课程或经历？`,r:'有助于专业匹配，但权重低于学术成绩。',key:'majorRelatedActivity'});
    }else{
      // 新加坡 / 中国香港：竞争激烈、学术为先
      qs.push({q:'你的 GPA / 成绩在同届中处于什么水平？',r:`${region}竞争激烈，GPA 是核心录取依据。`,key:'gpaThreshold'});
      qs.push({q:`你是否有与 ${major} 相关的代表性经历（项目、竞赛或活动）？`,r:'学术表现与专业匹配都很重要。',key:'majorRelatedActivity'});
      qs.push({q:'你是否计划尽早递交申请？',r:`${region}部分院校为滚动录取，早递交更有优势。`,key:'earlyApply'});
    }
  }else{
    if(/商业分析|数据科学|金融|统计/.test(major))
      qs.push({q:'你是否有 SQL、Python、Tableau、机器学习或数据分析相关项目？请说明项目内容和你的贡献。',r:'这类专业非常重视数据处理能力和商业问题拆解能力。',key:'dataSkills'});
    else if(/计算机|工程/.test(major))
      qs.push({q:`你是否有与${major}相关的项目或科研经历？请说明技术栈和你负责的部分。`,r:'硕士申请看重你的专业深度和动手能力是否匹配项目要求。',key:'techDepth'});

      qs.push({q:'你的实习是否和咨询、金融、互联网、数据分析或商业决策相关？',r:'相关实习会明显影响项目匹配度和文书可信度。',key:'internshipRelevance'});
    qs.push({q:`你是否已有明确职业目标（例如咨询、数据分析、产品、金融科技）？`,r:'职业目标清晰度会影响 SOP 的说服力。',key:'careerClarity'});
  }

}

/* ===================== SCORING ENGINE (spec §13-17) ===================== */
function num(v){if(!v)return null;const m=String(v).match(/([\d.]+)/);return m?parseFloat(m[1]):null;}
function gpaPct(type,val){const n=num(val);if(n==null)return null;
  if(/4\.0/.test(type)||(/^\d(\.\d+)?$/.test(String(val))&&n<=4.3))return Math.min(100,n/4*100);
  if(/5\.0/.test(type))return Math.min(100,n/5*100);
  if(/45/.test(type))return Math.min(100,n/45*100);
  if(n<=4.3)return n/4*100;
  return Math.min(100,n);}
function langScore01(type,val){const n=num(val);if(n==null)return 0.3;
  if(/IELTS/i.test(type))return clamp((n-5.5)/(8-5.5));
  if(/Duolingo/i.test(type))return clamp((n-95)/(140-95));
  if(/PTE/i.test(type))return clamp((n-50)/(86-50));
  return clamp((n-80)/(115-80));}// TOEFL default
function clamp(x){return Math.max(0,Math.min(1,x));}
function has(v){return v&&String(v).trim()&&!/^无$|^没有$|暂无/.test(String(v).trim());}
function richness(v){if(!has(v))return 0;const len=String(v).trim().length;return clamp(0.4+len/260);}

function scoreUndergrad(){
  const f=A.fields, fa=A.followUpAnswers, w=weights();
  const gp=gpaPct(f.gpaType,f.gpaValue);
  const rigor=({"AP":1,"IB":1,"A-Level":.95,"国际部 / 国际学校":.85,"OSSD":.85,"BC":.85,"VCE":.85,"普高课程":.6})[f.highSchoolCurriculum]||.65;
  const sAcademic=clamp(((gp!=null?gp/100:.6)*.7)+(rigor*.3));
  const lang=langScore01(f.languageTestType,f.languageScore);
  const std=has(f.standardizedTestScore)?clamp((num(f.standardizedTestScore)-1200)/(1550-1200)):(/Test Optional|暂无/.test(f.standardizedTestType||'')?.45:.4);
  const sTest=clamp(lang*.55+std*.45);
  const act=(richness(f.activities)*.4+richness(f.awards)*.25+richness(f.leadership)*.2+richness(f.researchExperience||f.projects)*.15);
  const sAct=clamp(act+(richness(fa.activitySpine)*.15));
  const sFit=clamp(({"已明确专业":1,"有大致方向":.7,"想申请 Undeclared":.55,"还不确定":.45}[f.majorCertainty]||.5)*.6 + (richness(fa.signatureActivity||fa.csLongTermProjects||fa.majorRelatedActivity))*.4);
  const sStrat=clamp(({"准备 ED / EA":.85,"还不确定":.55,"不准备早申":.5,"不适用":.5}[f.earlyDecisionPlan]||.5)*.4 + ({"有强推荐人":1,"有普通推荐人":.65,"还没确定":.4,"不清楚":.35}[f.recommendationLetters]||.4)*.3 + ({"已完成":1,"有初稿":.7,"还没开始":.4,"不清楚怎么写":.35}[f.personalStatementStatus]||.4)*.3);
  return {"学术成绩与课程难度":sAcademic*w["学术成绩与课程难度"],"语言与标化成绩":sTest*w["语言与标化成绩"],"活动与奖项":sAct*w["活动与奖项"],"个人主线与专业匹配":sFit*w["个人主线与专业匹配"],"申请策略与文书空间":sStrat*w["申请策略与文书空间"]};
}
function scoreGrad(){
  const f=A.fields, fa=A.followUpAnswers, w=weights();
  const gp=gpaPct(f.gpaType,f.gpaValue);
  const tier=({"985":1,"211":.85,"双一流":.8,"海外本科":.85,"港澳台本科":.8,"中外合办":.7,"双非":.55,"不确定":.6})[f.undergraduateSchoolTier]||.6;
  const sAcademic=clamp((gp!=null?gp/100:.6)*.6+tier*.4);
  const lang=langScore01(f.languageTestType,f.languageScore);
  const greNeed=/暂无|不需要|不确定/.test(f.greGmatType||'');
  const gre=has(f.greGmatScore)?.85:(greNeed?.55:.4);
  const sTest=clamp(lang*.6+gre*.4);
  const fitBase=({"非常看重排名":.6,"排名和专业都重要":.7,"更看重专业和就业":.8}[f.rankingPreference]||.6);
  const sFit=clamp(fitBase*.4+richness(f.coreCourses)*.25+richness(fa.fitEvidence||fa.dataSkills||fa.techDepth)*.35);
  const sExp=clamp(richness(f.internships)*.4+richness(f.researchExperience)*.2+richness(f.projects)*.15+richness(f.competitions)*.1+richness(f.workExperience||f.publications)*.15 + (has(fa.internshipRelevance)&&/相关|是/.test(fa.internshipRelevance)?.1:0));
  const sStrat=clamp(({"有强推荐人":1,"有普通推荐人":.65,"还没确定":.4,"不清楚":.35}[f.recommendationLetters]||.4)*.35 + ({"已完成":1,"有初稿":.7,"还没开始":.4,"不清楚怎么写":.35}[f.personalStatementStatus]||.4)*.35 + richness(f.careerGoal||fa.careerClarity)*.3);
  return {"学术背景":sAcademic*w["学术背景"],"语言与标化":sTest*w["语言与标化"],"专业匹配度":sFit*w["专业匹配度"],"实习 / 科研 / 项目背景":sExp*w["实习 / 科研 / 项目背景"],"申请材料与策略":sStrat*w["申请材料与策略"]};
}
function gradeFor(score){return score>=90?"A":score>=85?"A-":score>=80?"B+":score>=73?"B":score>=66?"B-":score>=58?"C+":score>=50?"C":"C-";}
function levelFor(ratio){return ratio>=.85?"优秀":ratio>=.7?"良好":ratio>=.55?"中等":ratio>=.4?"偏弱":"薄弱";}
function verdictFor(diff){// diff = schoolDifficulty - userScore
  if(diff>=22)return "高风险冲刺";if(diff>=13)return "冲刺";if(diff>=6)return "匹配偏冲刺";
  if(diff>=-5)return "匹配";if(diff>=-12)return "匹配偏稳";if(diff>=-24)return "保底";return "保底";}
function roleFor(v){return /高风险冲刺|冲刺/.test(v)?"冲刺校":/匹配偏稳|保底/.test(v)?"保底校":/不建议/.test(v)?"不建议":"匹配校";}

function computeScores(){return A.applicationLevel==='本科'?scoreUndergrad():scoreGrad();}
function buildSchoolVerdicts(overall){
  return A.targetSchools.map(s=>{
    const diff=schoolDifficulty(s.schoolName)-overall;
    let v=verdictFor(diff);
    if(diff>=34)v="高风险冲刺";
    const compScore=Math.round(clamp(1-(schoolDifficulty(s.schoolName)-overall+30)/90)*40+overall*.6);
    return {...s,verdict:v,competitivenessScore:Math.max(35,Math.min(96,compScore))};
  });
}

  const safety=sv.filter(s=>/保底/.test(s.verdict)).length;
  const weakDim=Object.entries(scores).map(([k,v])=>[k,v/(weights()[k])]).sort((a,b)=>a[1]-b[1])[0][0];

  if(reach>=Math.ceil(sv.length/2))risks.push("冲刺类学校占比偏高，建议补充匹配与保底学校以平衡风险。");
  risks.push(`${weakDim}是当前相对最弱的一项，可能拉低整体竞争力。`);
  if(A.applicationLevel==='硕士'&&!has(A.fields.internships))risks.push("缺少与目标专业相关的实习 / 项目证明，专业匹配度有待加强。");

  const riskLevel=["低","中等偏低","中等","中等偏高","高"][riskIdx];

  const fr={
    assessmentId:A.id, applicationLevel:A.applicationLevel,
    overallScore:overall, overallGrade:gradeFor(overall),
    riskLevel,
    summary:`从你目前填写的信息看，你的${A.applicationLevel}申请综合竞争力约为 ${gradeFor(overall)} 档。${riskPhrase}。系统初步识别到，在${weakDim}、背景证明力和保底学校设置上还有可以优化的空间——完整报告会逐项拆解，并给出具体的提升方法。`,
    schoolPreview: sv.map(s=>({schoolName:s.schoolName,programName:s.majorName,region:s.region,initialVerdict:s.verdict})),
    topRisks: risks.slice(0,3),

  const ai=await aiPost('/api/free-result',{profile:aiProfile(),overall,grade:fr.overallGrade,
    verdicts:sv.map(s=>({schoolName:s.schoolName,verdict:s.verdict}))});
  await finishProgress();
  if(ai){ if(typeof ai.summary==='string'&&ai.summary.trim())fr.summary=ai.summary;
    if(Array.isArray(ai.topRisks)&&ai.topRisks.length)fr.topRisks=ai.topRisks.slice(0,3); }
  A.freeResult=fr; A.status='free_done'; saveDB();
  go('freeResult');
}

/* 给模型的只读上下文：包含分数与分层，但不含冗长字段 */
function reportContextForAI(R){
  return {applicationLevel:R.applicationLevel, targetMajorCategory:R.userProfileSummary.targetMajorCategory,
    targetRegions:R.userProfileSummary.targetRegions, overallScore:R.executiveSummary.overallScore,
    overallGrade:R.executiveSummary.overallGrade, riskLevel:R.executiveSummary.overallVerdict,
    scoreBreakdown:R.scoreBreakdown.map(d=>({dimension:d.dimension,score:d.score,weight:d.weight,level:d.level})),
    schools:R.schoolAnalysis.map(s=>({schoolName:s.schoolName,verdict:s.verdict,role:s.roleInSchoolList})),
    background:R.userProfileSummary.backgroundSummary, academic:R.userProfileSummary.academicSummary,
    tests:R.userProfileSummary.testSummary, experience:R.userProfileSummary.experienceSummary};
}
/* 把模型返回的判断/文案安全地覆盖到报告对象（分数与标签保持不变；字段缺失则保留规则引擎原值） */
function overlayReport(R,ai){
  const S=v=>typeof v==='string'&&v.trim();
  try{
    const e=ai.executiveSummary;
    if(e){["oneSentenceConclusion","mainOpportunity","mainRisk","recommendedStrategy"].forEach(k=>{if(S(e[k]))R.executiveSummary[k]=e[k];});}
    // 五维：按 dimension 名称匹配，只覆盖文字，不动分数/权重
    if(Array.isArray(ai.scoreBreakdown))ai.scoreBreakdown.forEach(a=>{const t=R.scoreBreakdown.find(d=>d.dimension===(a&&a.dimension));if(t){if(S(a.analysis))t.analysis=a.analysis;if(S(a.improvementAdvice))t.improvementAdvice=a.improvementAdvice;}});
    // 逐校：按 schoolName 匹配，只覆盖文字，不动 verdict/score/role
    if(Array.isArray(ai.schoolAnalysis)){
      const norm=x=>(x||'').toLowerCase().replace(/[()（）.\s]/g,'');
      const findSchool=(name,idx)=>{
        if(name){let t=R.schoolAnalysis.find(s=>s.schoolName===name);if(t)return t;
          const n=norm(name);
          t=R.schoolAnalysis.find(s=>norm(s.schoolName)===n);if(t)return t;
          t=R.schoolAnalysis.find(s=>n&&(norm(s.schoolName).includes(n)||n.includes(norm(s.schoolName))));if(t)return t;}
        // 名字对不上时，若数量一致则按顺序兜底
        if(ai.schoolAnalysis.length===R.schoolAnalysis.length)return R.schoolAnalysis[idx];
        return null;
      };
      ai.schoolAnalysis.forEach((a,idx)=>{const t=findSchool(a&&a.schoolName,idx);if(t){
        if(S(a.whyThisVerdict))t.whyThisVerdict=a.whyThisVerdict;
        if(Array.isArray(a.strengths)&&a.strengths.length)t.strengthsForThisSchool=a.strengths.filter(S);
        if(Array.isArray(a.weaknesses)&&a.weaknesses.length)t.weaknessesForThisSchool=a.weaknesses.filter(S);
        if(S(a.applicationAdvice))t.applicationAdvice=a.applicationAdvice;
        if(Array.isArray(a.improvementPath)&&a.improvementPath.length)t.improvementPathForThisSchool=a.improvementPath.filter(S);}});
    }
    // 把 AI 更新后的逐校判断同步进"冲刺/匹配/保底分层"（修复快照不更新的问题）
    if(R.schoolListStrategy){const sync=arr=>(arr||[]).forEach(x=>{const t=R.schoolAnalysis.find(s=>s.schoolName===x.schoolName);if(t&&S(t.whyThisVerdict))x.reason=t.whyThisVerdict;});
      ["reachSchools","targetSchools","safetySchools","notRecommended"].forEach(k=>sync(R.schoolListStrategy[k]));}
    if(Array.isArray(ai.strengths)&&ai.strengths.length)R.strengths=ai.strengths.filter(s=>s&&s.title).map(s=>({title:s.title,detail:s.detail||''}));

/* free-result radar (能力画像 teaser: shape + labels, no numbers) */
function freeRadarSVG(scores,w){
  const dims=Object.keys(scores),N=dims.length,cx=150,cy=135,R=86;
  const pt=(f,i)=>{const a=-Math.PI/2+i*2*Math.PI/N;return [cx+Math.cos(a)*R*f,cy+Math.sin(a)*R*f];};
  const rings=[.34,.67,1].map(f=>`<polygon points="${dims.map((d,i)=>pt(f,i).map(n=>n.toFixed(1)).join(',')).join(' ')}" fill="none" stroke="#E5E7EB"/>`).join('');
  const axes=dims.map((d,i)=>{const[x,y]=pt(1,i);return `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#E5E7EB"/>`;}).join('');
  const poly=`<polygon points="${dims.map((d,i)=>pt(clamp(scores[d]/w[d]),i).map(n=>n.toFixed(1)).join(',')).join(' ')}" fill="rgba(37,99,235,.20)" stroke="#2563EB" stroke-width="2"/>`;
  const dots=dims.map((d,i)=>{const[x,y]=pt(clamp(scores[d]/w[d]),i);return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="#1E3A8A"/>`;}).join('');
  const labels=dims.map((d,i)=>{const a=-Math.PI/2+i*2*Math.PI/N;const lx=cx+Math.cos(a)*(R+18),ly=cy+Math.sin(a)*(R+12);
    const anchor=Math.abs(Math.cos(a))<.3?'middle':(Math.cos(a)>0?'start':'end');
    const short=d.replace(/与课程难度|与标化成绩|与标化|与专业匹配|与文书空间|与策略| \/ 科研 \/ 项目背景|背景|材料/g,'').slice(0,6);
    return `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" font-size="11.5" fill="#6B7280" text-anchor="${anchor}">${short}</text>`;}).join('');
  return `<svg class="radar" viewBox="0 0 300 270">${rings}${axes}${poly}${dots}${labels}</svg>`;
}

/* radar chart (pure SVG) */
function radarSVG(bd,w){
  const cx=190,cy=150,R=110,N=bd.length;
  const pts=bd.map((d,i)=>{const ang=-Math.PI/2+i*2*Math.PI/N;const v=d.score/d.weight;
    return [cx+Math.cos(ang)*R*v, cy+Math.sin(ang)*R*v, cx+Math.cos(ang)*R, cy+Math.sin(ang)*R, ang];});
  const rings=[.25,.5,.75,1].map(f=>`<polygon points="${bd.map((d,i)=>{const ang=-Math.PI/2+i*2*Math.PI/N;return `${cx+Math.cos(ang)*R*f},${cy+Math.sin(ang)*R*f}`;}).join(' ')}" fill="none" stroke="#E5E7EB" stroke-width="1"/>`).join('');
  const axes=pts.map(p=>`<line x1="${cx}" y1="${cy}" x2="${p[2]}" y2="${p[3]}" stroke="#E5E7EB" stroke-width="1"/>`).join('');
  const poly=`<polygon points="${pts.map(p=>`${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ')}" fill="rgba(37,99,235,.18)" stroke="#2563EB" stroke-width="2"/>`;
  const dots=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="#1E3A8A"/>`).join('');
  const labels=bd.map((d,i)=>{const ang=-Math.PI/2+i*2*Math.PI/N;const lx=cx+Math.cos(ang)*(R+22),ly=cy+Math.sin(ang)*(R+18);
    const anchor=Math.abs(Math.cos(ang))<.3?'middle':(Math.cos(ang)>0?'start':'end');
    const short=d.dimension.replace(/与课程难度|与标化成绩|与标化|与专业匹配|与文书空间|与策略| \/ 科研 \/ 项目背景|背景|材料/g,'').slice(0,6);
    return `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" font-size="11" fill="#6B7280" text-anchor="${anchor}">${short}</text>`;}).join('');
  return `<svg class="radar" viewBox="0 0 380 300">${rings}${axes}${poly}${dots}${labels}</svg>`;
}

/* ===================== BOOT ===================== */
try{if('scrollRestoration' in history)history.scrollRestoration='manual';}catch(e){}
// 支付返回：URL 带 os_paid=订单号 时，确认支付并自动跳到报告（修复手机端付完落到错误页）
async function resumeAfterPay(outTradeNo){
  showLoading('支付确认中…');
  let paid=false,pt='premium_report',aid='';
  for(let i=0;i<8;i++){
    try{const r=await fetch('/api/pay/status?outTradeNo='+encodeURIComponent(outTradeNo));const j=await r.json();
      if(j&&j.found){if(j.productType)pt=j.productType;if(j.assessmentId)aid=j.assessmentId;if(j.paid){paid=true;break;}}}catch(e){}
    await new Promise(s=>setTimeout(s,1500));
  }
  hideLoading();
  try{history.replaceState({view:'home'},'',location.pathname);}catch(e){}
  if(paid){
    const all=loadDB();if(aid&&all[aid])A=all[aid];
    A.isPaid=true;A.reportType=pt;A.status='paid';saveDB();
    go('report');
  }else{ toast('支付尚未确认，如已付款请稍候刷新'); RENDER.home(); }
}
window.addEventListener('DOMContentLoaded',()=>{
  let psp='';try{psp=new URLSearchParams(location.search).get('os_paid')||'';}catch(e){}
  if(psp){ if(!A||!A.id)newAssessment(); try{history.replaceState({view:'home'},'');}catch(e){} resumeAfterPay(psp); return; }
  newAssessment();try{history.replaceState({view:'home'},'');}catch(e){}RENDER.home();
});
</script>
